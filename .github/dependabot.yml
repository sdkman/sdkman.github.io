version: 2

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'friday'
    open-pull-requests-limit: 5
    commit-message:
      prefix: '[chore]'
    groups:
      react:
        patterns:
          - 'react'
          - 'react-dom'
      docusaurus:
        patterns:
          - '@docusaurus/*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'friday'
    open-pull-requests-limit: 5
    commit-message:
      prefix: '[chore]'
